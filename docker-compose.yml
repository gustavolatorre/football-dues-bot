# Stack local que espelha o Railway: bot + Postgres.
# Uso:  docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: mensalidade
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d mensalidade"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      # sobrescreve o DATABASE_URL do .env -> usa o Postgres do compose
      DATABASE_URL: postgresql+psycopg2://bot:bot@db:5432/mensalidade
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
